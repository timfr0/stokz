name: Manual Site Publish

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stokz-daily-site-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Install forecast service
        run: python -m pip install -e ./services/forecast

      - name: Generate publish-ready artifacts
        shell: bash
        run: |
          set -a
          source .env.example
          set +a
          export STOKZ_TIMESFM_BACKEND=placeholder
          python -m stokz_forecast.cli publish-site-data

      - name: Validate web build
        run: pnpm --filter web build

      - name: Add review to workflow summary
        shell: bash
        run: |
          if [ -f services/forecast/generated/reviews/latest-report.md ]; then
            cat services/forecast/generated/reviews/latest-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit generated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/forecast/generated
          if git diff --cached --quiet; then
            echo "No generated changes to commit." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git commit -m "chore: publish daily site data ($(date -u +%F))"
          git push
